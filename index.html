<!DOCTYPE html>
<html>
<body>

<h3>WhatsApp Sender</h3>

<input id="phone" placeholder="Enter phone (+91...)" /><br><br>
<input id="message" placeholder="Enter message" /><br><br>

<button onclick="sendMessage()">Send</button>

<p id="status"></p>

<script>
function sendMessage() {
  // 🔥 GET INPUT VALUES
  const phone = document.getElementById("phone").value;
  const msg = document.getElementById("message").value;

  if (!phone || !msg) {
    document.getElementById("status").innerText = "Enter all fields";
    return;
  }

  // 🔥 SEND TO BACKEND
  fetch("/api/send", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      user_phone: phone,
      message: msg
    })
  })
  .then(res => res.json())
  .then(res => {
    if (res.status === "success") {
      document.getElementById("status").innerText = "Message sent ✅";
    } else {
      document.getElementById("status").innerText = res.message;

      // redirect to join
      window.open("https://wa.me/14155238886?text=join%20rate-topic");
    }
  })
  .catch(() => {
    document.getElementById("status").innerText = "Error";
  });
}
</script>

</body>
</html>
